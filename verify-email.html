<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AlgoQuest — Vérification email</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0F172A;
      color: #CBD5E1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      max-width: 420px;
      width: 100%;
      background: #1E293B;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      text-align: center;
    }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; font-weight: 700; color: #F1F5F9; margin-bottom: 0.75rem; }
    p { font-size: 0.95rem; line-height: 1.6; color: #94A3B8; margin-bottom: 1.5rem; }
    .btn {
      display: inline-block;
      background: #3B82F6;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      padding: 0.75rem 2rem;
      border-radius: 10px;
      text-decoration: none;
      cursor: pointer;
      border: none;
    }
    .btn:hover { background: #2563EB; }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #334155;
      border-top-color: #3B82F6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <!-- Loading -->
    <div id="state-loading">
      <div class="spinner"></div>
      <p>Vérification en cours…</p>
    </div>

    <!-- Success -->
    <div id="state-success" class="hidden">
      <div class="icon">✅</div>
      <h1>Email vérifié !</h1>
      <p>Ton compte AlgoQuest est activé. Retourne dans l'app pour continuer.</p>
      <a id="open-app-btn" href="algoquest://" class="btn">Ouvrir AlgoQuest</a>
    </div>

    <!-- Error -->
    <div id="state-error" class="hidden">
      <div class="icon">❌</div>
      <h1>Lien invalide</h1>
      <p id="error-msg">Ce lien de vérification est expiré ou invalide. Réessaie depuis l'app.</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://pesogbtzdpfbghqipssb.supabase.co'
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBlc29nYnR6ZHBmYmdocWlwc3NiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2MDg4OTgsImV4cCI6MjA4OTE4NDg5OH0.hCZmVIpCVKlKYO7DarQLn_hmXeWov8MKuI6AlqI1Xjk'

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    function show(id) {
      ['state-loading', 'state-success', 'state-error'].forEach(s => {
        document.getElementById(s).classList.toggle('hidden', s !== id)
      })
    }

    async function verify() {
      // Supabase sends either token_hash (PKCE) or access_token (implicit)
      const params = new URLSearchParams(window.location.search)
      const hash = new URLSearchParams(window.location.hash.slice(1))

      const tokenHash = params.get('token_hash')
      const type = params.get('type') || hash.get('type')
      const accessToken = hash.get('access_token')
      const refreshToken = hash.get('refresh_token')

      try {
        if (tokenHash && type) {
          // PKCE flow (newer Supabase)
          const { error } = await supabase.auth.verifyOtp({ token_hash: tokenHash, type })
          if (error) throw error
        } else if (accessToken) {
          // Implicit flow (older Supabase)
          const { error } = await supabase.auth.setSession({ access_token: accessToken, refresh_token: refreshToken || '' })
          if (error) throw error
        } else {
          throw new Error('Aucun token trouvé dans l\'URL')
        }

        show('state-success')
        // Auto-redirect to app after 2s
        setTimeout(() => { window.location.href = 'algoquest://' }, 2000)
      } catch (err) {
        document.getElementById('error-msg').textContent = err.message || 'Lien invalide ou expiré.'
        show('state-error')
      }
    }

    verify()
  </script>
</body>
</html>
