<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AlgoQuest — Mentions légales</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0F172A;
      color: #CBD5E1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      max-width: 480px;
      width: 100%;
      background: #1E293B;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 2.5rem;
      text-align: center;
    }
    h1 { color: #F8FAFC; font-size: 1.6rem; margin-bottom: 0.4rem; }
    p { color: #64748B; font-size: 0.95rem; margin-bottom: 2rem; }
    .links { display: flex; flex-direction: column; gap: 0.75rem; }
    a {
      display: block;
      background: #0F172A;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 1rem 1.5rem;
      color: #38BDF8;
      text-decoration: none;
      font-size: 1rem;
      transition: border-color 0.15s;
    }
    a:hover { border-color: #38BDF8; }
    .sub { font-size: 0.8rem; color: #475569; margin-top: 2rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>AlgoQuest</h1>
    <p>Documents légaux de l'application</p>
    <div class="links">
      <a href="./privacy-policy.html">🔒 Politique de confidentialité</a>
      <a href="./terms.html">📄 Conditions Générales d'Utilisation</a>
    </div>
    <p class="sub">© 2026 AlgoQuest · <a href="mailto:roro.sonigoo@gmail.com" style="color:#475569">roro.sonigoo@gmail.com</a></p>
  </div>
</body>
</html>
